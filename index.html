<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Long-Distance Virtual Date Booth Studio</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #24142c 100%);
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent-pink: #ff477e;
            --accent-blue: #00f3ff;
            --accent-purple: #9b51e0;
            --glow: 0 0 20px rgba(255, 71, 126, 0.3);
        }

        body {
            background: var(--bg-gradient);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, #ff477e, #00f3ff, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #a0aec0;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .room-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 480px;
            justify-content: center;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            width: 200px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        button {
            font-weight: 700;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff477e 0%, #9b51e0 100%);
            color: white;
            box-shadow: var(--glow);
        }

        .studio-dashboard {
            display: grid;
            grid-template-columns: 240px 1fr 260px;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            align-items: start;
        }

        .studio-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .panel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a0aec0;
            margin-bottom: 15px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 8px;
            text-align: center;
        }

        .props-grid, .templates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .prop-item, .template-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .prop-item:hover, .template-item:hover {
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.03);
            transform: translateY(-2px);
        }

        .prop-item.active, .template-item.active {
            border-color: var(--accent-pink);
            background: rgba(255, 71, 126, 0.1);
            box-shadow: 0 0 12px rgba(255, 71, 126, 0.2);
        }

        .prop-svg {
            width: 50px;
            height: 35px;
            fill: #fff;
            transition: fill 0.3s;
        }
        .prop-item.active .prop-svg { fill: var(--accent-pink); }

        .template-thumb {
            width: 100%;
            height: 70px;
            border-radius: 6px;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .template-item span {
            font-size: 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .main-stage {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .split-booth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            height: 340px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            position: relative;
            padding: 16px;
            box-sizing: border-box;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 14px;
            overflow: hidden;
            background: #09070f;
            border: 1px solid rgba(255,255,255,0.05);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video { transform: scaleX(-1); }

        .overlay-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .local-canvas { transform: scaleX(-1); }

        .filmstrip-deck {
            background: #07050d;
            border: 3px dashed #1a1625;
            border-radius: 16px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            height: 120px;
            box-sizing: border-box;
        }

        .deck-slot {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a4557;
            font-size: 1.5rem;
            font-weight: bold;
            overflow: hidden;
            position: relative;
        }
        .deck-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .countdown {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            z-index: 20;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #strip-output {
            margin-top: 30px;
            display: none;
            text-align: center;
            width: 100%;
        }
        #finalCanvas {
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 1050px) {
            .studio-dashboard { grid-template-columns: 1fr; }
            .props-grid, .templates-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 600px) {
            .split-booth { grid-template-columns: 1fr; height: 460px; }
            .props-grid, .templates-grid { grid-template-columns: 1fr 1fr; }
            .filmstrip-deck { grid-template-columns: 1fr 1fr; height: auto; gap: 8px;}
            .deck-slot { height: 80px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>VIRTUAL DATE STUDIO</h1>
        <div class="subtitle">Customizable Realtime Photobooth</div>
    </header>

    <div class="room-controls">
        <input type="text" id="room-input" placeholder="Room ID" value="date-night">
        <button id="join-btn" class="btn-primary" onclick="connectToRoom()">Join Studio</button>
    </div>

    <div class="studio-dashboard">
        <div class="studio-panel">
            <div class="panel-title">Props & Accessories</div>
            <div class="props-grid">
                <div class="prop-item active" id="prop-none" onclick="selectProp('none', this)">
                    <span style="font-size:1.5rem;">❌</span>
                    <span style="font-size:0.75rem; font-weight:600;">Clear</span>
                </div>
                <div class="prop-item" id="prop-glasses" onclick="selectProp('glasses', this)">
                    <svg class="prop-svg" viewBox="0 0 24 24"><path d="M4 8.5a2.5 2.5 0 0 1 4.75-.75h4.5a2.5 2.5 0 0 1 4.75.75 2.5 2.5 0 1 1-5 0h-1a2.5 2.5 0 1 1-5 0h-1a2.5 2.5 0 0 1-2.5 2.5zm0 1a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm16-1.5a1.5 1.5 0 1 0-3 0 1.5 1.5 0 0 0 3 0z"/></svg>
                    <span>Retro Red</span>
                </div>
                <div class="prop-item" id="prop-mustache" onclick="selectProp('mustache', this)">
                    <svg class="prop-svg" viewBox="0 0 24 24"><path d="M12 14c-1.5-2.5-4.5-3.5-7-3.5A4.5 4.5 0 0 0 0.5 15c0 2 2 3.5 4.5 3.5 4 0 5.5-2.5 7-4.5 1.5 2 3 4.5 7 4.5 2.5 0 4.5-1.5 4.5-3.5a4.5 4.5 0 0 0-4.5-4.5c-2.5 0-5.5 1-7 3.5z"/></svg>
                    <span>Mustache</span>
                </div>
                <div class="prop-item" id="prop-bowtie" onclick="selectProp('bowtie', this)">
                    <svg class="prop-svg" viewBox="0 0 24 24"><path d="M3 6l5 4-5 4V6zm18 0v8l-5-4 5-4zm-10 4a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM8.3 10.5l3.7-3 3.7 3-3.7 3-3.7-3z"/></svg>
                    <span>Classy Bow</span>
                </div>
            </div>
        </div>

        <div class="main-stage">
            <div class="split-booth">
                <div class="video-container">
                    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
                    <canvas id="localOverlay" class="overlay-canvas local-canvas"></canvas>
                </div>
                <div class="video-container">
                    <video id="remoteVideo" autoplay playsinline></video>
                    <canvas id="remoteOverlay" class="overlay-canvas"></canvas>
                </div>
                <div id="countdown" class="countdown"></div>
            </div>

            <div class="filmstrip-deck">
                <div class="deck-slot" id="slot-0">1</div>
                <div class="deck-slot" id="slot-1">2</div>
                <div class="deck-slot" id="slot-2">3</div>
                <div class="deck-slot" id="slot-3">4</div>
            </div>

            <button id="action-btn" class="btn-primary" style="padding:16px; font-size:1.1rem;" onclick="syncTrigger()" disabled>SNAP BOOTH WORKSPACE</button>
        </div>

        <div class="studio-panel">
            <div class="panel-title">Templates & Layouts</div>
            <div class="templates-grid">
                <div class="template-item active" onclick="selectTemplate('midnight', this)">
                    <div class="template-thumb" style="background-color:#09070f; border: 2px solid #1a1625;"></div>
                    <span>Midnight Dark</span>
                </div>
                <div class="template-item" onclick="selectTemplate('filmstrip', this)">
                    <div class="template-thumb" style="background: repeating-linear-gradient(90deg, #111, #111 20px, #fff 21px, #fff 25px)"></div>
                    <span>🎞️ Vintage Film</span>
                </div>
                <div class="template-item" onclick="selectTemplate('retro', this)">
                    <div class="template-thumb" style="background-color:#f4ebd0;"></div>
                    <span>📼 Matte Polaroid</span>
                </div>
                <div class="template-item" onclick="selectTemplate('festive', this)">
                    <div class="template-thumb" style="background: linear-gradient(45deg, #ff477e, #9b51e0);"></div>
                    <span>💖 Anniversary</span>
                </div>
            </div>
        </div>
    </div>

    <div id="strip-output">
        <h2 style="color: #e2e8f0; margin-bottom:20px;">✨ Your Custom Studio Masterpiece ✨</h2>
        <canvas id="finalCanvas"></canvas>
        <br>
        <button id="download-btn" class="btn-primary" style="margin-top:25px; padding: 14px 35px;">📥 Save High-Res Photo Strip</button>
    </div>

    <script>
        const socket = io();
        let localStream, peer = null, roomId, capturedFrames = [];
        let activeProp = 'none';
        let activeTemplate = 'midnight';

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const localOverlay = document.getElementById('localOverlay');
        const remoteOverlay = document.getElementById('remoteOverlay');
        const countdownEl = document.getElementById('countdown');
        const actionBtn = document.getElementById('action-btn');
        const canvas = document.getElementById('finalCanvas');
        const ctx = canvas.getContext('2d');

        async function setupCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                localVideo.srcObject = localStream;
            } catch (err) {
                console.error("Camera access blocked: ", err);
            }
            requestAnimationFrame(drawLoop);
        }

        // Percentage-based dynamic positioning engine
        function drawLoop() {
            renderPropOnCanvas(localVideo, localOverlay, activeProp);
            renderPropOnCanvas(remoteVideo, remoteOverlay, window.remoteProp || 'none');
            requestAnimationFrame(drawLoop);
        }

        function renderPropOnCanvas(video, canvasEl, prop) {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvasEl.width !== video.videoWidth || canvasEl.height !== video.videoHeight) {
                    canvasEl.width = video.videoWidth;
                    canvasEl.height = video.videoHeight;
                }
                const oCtx = canvasEl.getContext('2d');
                oCtx.clearRect(0, 0, canvasEl.width, canvasEl.height);

                if (prop && prop !== 'none') {
                    // Coordinates scaled to a percentage grid of the stream box
                    const cx = canvasEl.width * 0.5;
                    const cy = canvasEl.height * 0.42; 
                    const scaleFactor = canvasEl.width / 640; 

                    oCtx.save();
                    if (prop === 'glasses') {
                        oCtx.strokeStyle = '#ff477e';
                        oCtx.fillStyle = '#ff477e';
                        oCtx.lineWidth = 8 * scaleFactor;
                        
                        oCtx.beginPath(); oCtx.arc(cx - (55 * scaleFactor), cy, 32 * scaleFactor, 0, Math.PI * 2); oCtx.stroke();
                        oCtx.beginPath(); oCtx.arc(cx + (55 * scaleFactor), cy, 32 * scaleFactor, 0, Math.PI * 2); oCtx.stroke();
                        oCtx.fillRect(cx - (25 * scaleFactor), cy - (4 * scaleFactor), 50 * scaleFactor, 8 * scaleFactor);
                    } else if (prop === 'mustache') {
                        oCtx.fillStyle = '#1a1625';
                        const my = cy + (65 * scaleFactor);
                        oCtx.beginPath();
                        oCtx.moveTo(cx, my);
                        oCtx.bezierCurveTo(cx - (40 * scaleFactor), my - (10 * scaleFactor), cx - (70 * scaleFactor), my + (10 * scaleFactor), cx - (90 * scaleFactor), my);
                        oCtx.bezierCurveTo(cx - (50 * scaleFactor), my + (35 * scaleFactor), cx, my + (20 * scaleFactor), cx, my + (5 * scaleFactor));
                        oCtx.bezierCurveTo(cx, my + (20 * scaleFactor), cx + (50 * scaleFactor), my + (35 * scaleFactor), cx + (90 * scaleFactor), my);
                        oCtx.bezierCurveTo(cx + (70 * scaleFactor), my + (10 * scaleFactor), cx + (40 * scaleFactor), my - (10 * scaleFactor), cx, my);
                        oCtx.closePath(); oCtx.fill();
                    } else if (prop === 'bowtie') {
                        oCtx.fillStyle = '#9b51e0';
                        const by = cy + (140 * scaleFactor);
                        oCtx.beginPath();
                        oCtx.moveTo(cx, by);
                        oCtx.lineTo(cx - (55 * scaleFactor), by - (30 * scaleFactor));
                        oCtx.lineTo(cx - (55 * scaleFactor), by + (30 * scaleFactor));
                        oCtx.closePath(); oCtx.fill();
                        oCtx.beginPath();
                        oCtx.moveTo(cx, by);
                        oCtx.lineTo(cx + (55 * scaleFactor), by - (30 * scaleFactor));
                        oCtx.lineTo(cx + (55 * scaleFactor), by + (30 * scaleFactor));
                        oCtx.closePath(); oCtx.fill();
                        oCtx.fillStyle = '#ffffff';
                        oCtx.beginPath(); oCtx.arc(cx, by, 10 * scaleFactor, 0, Math.PI * 2); oCtx.fill();
                    }
                    oCtx.restore();
                }
            }
        }

        function selectProp(propName, element) {
            activeProp = propName;
            document.querySelectorAll('.prop-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            if(roomId) socket.emit('studio-prop', { room: roomId, prop: propName });
        }

        function selectTemplate(templateName, element) {
            activeTemplate = templateName;
            document.querySelectorAll('.template-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }

        socket.on('update-studio-prop', (propName) => { window.remoteProp = propName; });

        function connectToRoom() {
            roomId = document.getElementById('room-input').value;
            socket.emit('join-room', roomId);
            const joinBtn = document.getElementById('join-btn');
            joinBtn.innerText = "Connected Studio ✓";
            joinBtn.style.background = "#00f3ff";
        }

        socket.on('peer-joined', (peerId) => initPeer(peerId, true));
        socket.on('signal', (data) => {
            if (!peer) initPeer(data.from, false);
            peer.signal(data.signal);
        });

        function initPeer(peerId, initiator) {
            peer = new SimplePeer({
                initiator: initiator, trickle: false, stream: localStream,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            peer.on('signal', (signal) => socket.emit('signal', { to: peerId, signal: signal }));
            peer.on('stream', (stream) => {
                remoteVideo.srcObject = stream;
                actionBtn.disabled = false;
            });
        }

        function syncTrigger() { socket.emit('trigger-booth', roomId); }

        socket.on('start-countdown', async () => {
            actionBtn.disabled = true;
            capturedFrames = [];
            for(let s=0; s<4; s++) document.getElementById(`slot-${s}`).innerHTML = s+1;

            for (let i = 0; i < 4; i++) {
                for (let count = 3; count > 0; count--) {
                    countdownEl.innerText = count;
                    await new Promise(r => setTimeout(r, 1000));
                }
                countdownEl.innerText = "📸";
                captureStudioFrame(i);
                await new Promise(r => setTimeout(r, 800));
                countdownEl.innerText = "";
            }
            buildStudioStrip();
            actionBtn.disabled = false;
        });

        function captureStudioFrame(slotIndex) {
            const snap = document.createElement('canvas');
            snap.width = 800; snap.height = 320;
            const sCtx = snap.getContext('2d');

            sCtx.save();
            sCtx.translate(400, 0); sCtx.scale(-1, 1);
            sCtx.drawImage(localVideo, 0, 0, 400, 320);
            sCtx.translate(400, 0); sCtx.scale(-1, 1); 
            sCtx.drawImage(localOverlay, 0, 0, 400, 320);
            sCtx.restore();

            if (remoteVideo.srcObject) {
                sCtx.drawImage(remoteVideo, 400, 0, 400, 320);
                sCtx.drawImage(remoteOverlay, 400, 0, 400, 320);
            } else {
                sCtx.fillStyle = '#110e1a'; sCtx.fillRect(400, 0, 400, 320);
            }

            const dataUrl = snap.toDataURL('image/png');
            capturedFrames.push(dataUrl);
            document.getElementById(`slot-${slotIndex}`).innerHTML = `<img src="${dataUrl}">`;
        }

        function buildStudioStrip() {
            const w = 800; const h = 320; const p = 24;
            canvas.width = w + (p * 2);
            canvas.height = (h * 4) + (p * 5) + 60;

            if (activeTemplate === 'midnight') ctx.fillStyle = "#09070f";
            else if (activeTemplate === 'retro') ctx.fillStyle = "#f4ebd0";
            else if (activeTemplate === 'festive') ctx.fillStyle = "#fff0f5";
            else if (activeTemplate === 'filmstrip') ctx.fillStyle = "#111116";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let loadedCount = 0;
            capturedFrames.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    const rowY = p + (i * (h + p));
                    ctx.drawImage(img, p, rowY, w, h);

                    if (activeTemplate === 'filmstrip') {
                        ctx.fillStyle = "#ffffff";
                        for(let x = p; x < canvas.width - p; x += 30) {
                            ctx.fillRect(x, rowY - 16, 14, 10); 
                            ctx.fillRect(x, rowY + h + 6, 14, 10); 
                        }
                    } else if (activeTemplate === 'festive') {
                        ctx.fillStyle = "#ff477e";
                        ctx.font = "28px Arial";
                        ctx.fillText("💖", p + 15, rowY + 45);
                        ctx.fillText("💖", p + w - 50, rowY + h - 20);
                    }

                    loadedCount++;
                    if (loadedCount === 4) {
                        ctx.fillStyle = activeTemplate === 'retro' ? '#5c4d3c' : '#ffffff';
                        ctx.font = "bold 20px monospace";
                        ctx.fillText(`STUDIO STRIP // TEMPLATE: ${activeTemplate.toUpperCase()} // 2026`, p + 20, canvas.height - 25);
                        
                        document.getElementById('strip-output').style.display = 'block';
                        document.getElementById('strip-output').scrollIntoView({ behavior: 'smooth' });
                    }
                };
                img.src = src;
            });

            document.getElementById('download-btn').onclick = () => {
                const link = document.createElement('a');
                link.download = `studio-${activeTemplate}-strip.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
            };
        }

        setupCamera();
    </script>
</body>
</html>
